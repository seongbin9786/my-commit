service: my-commit-web

frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: ${opt:region, 'ap-northeast-2'}
  stage: ${opt:stage, 'dev'}
  stackName: ${self:provider.stage}-${self:service}

custom:
  bucketName: my-commit-web-sb-${self:provider.stage}
  webDomainName: ${env:WEB_DOMAIN_NAME, ''}
  acmCertificateArn: ${env:ACM_CERTIFICATE_ARN, ''}

  s3Sync:
    - bucketName: ${self:custom.bucketName}
      localDir: dist
      deleteRemoved: true
      params:
        - index.html:
            CacheControl: 'no-cache'
        # Service Worker는 항상 최신 버전 체크가 가능해야 하므로 immutable 금지
        - sw.js:
            CacheControl: 'no-cache, no-store, must-revalidate'
        - registerSW.js:
            CacheControl: 'no-cache, no-store, must-revalidate'
        - manifest.webmanifest:
            CacheControl: 'no-cache, no-store, must-revalidate'
        - 'workbox-*.js':
            CacheControl: 'public, max-age=31536000, immutable'
        - '*.css':
            CacheControl: 'public, max-age=31536000, immutable'
        - '*.woff2':
            CacheControl: 'public, max-age=31536000, immutable'
        - 'assets/*':
            CacheControl: 'public, max-age=31536000, immutable'

plugins:
  - serverless-s3-sync
  # [이유] CloudFront Distribution ID를 자동으로 찾지 못하는 문제 등으로 인해 배포 실패 발생. 캐시 무효화는 수동으로 진행하거나 추후 설정.
  # - serverless-cloudfront-invalidate  # 설정 필요, 일단 비활성화

resources:
  Conditions:
    HasWebDomainName:
      Fn::Not:
        - Fn::Equals:
            - ${self:custom.webDomainName}
            - ''
    HasAcmCertificateArn:
      Fn::Not:
        - Fn::Equals:
            - ${self:custom.acmCertificateArn}
            - ''
    UseCustomDomain:
      Fn::And:
        - Condition: HasWebDomainName
        - Condition: HasAcmCertificateArn

  Resources:
    # index.html, service worker 같은 진입 파일의 배포 직후 최신 버전 확인
    CachingDisabledPolicy:
      Type: AWS::CloudFront::CachePolicy
      Properties:
        CachePolicyConfig:
          Name: ${self:provider.stage}-${self:service}-caching-disabled
          DefaultTTL: 0
          MaxTTL: 1
          MinTTL: 0
          ParametersInCacheKeyAndForwardedToOrigin:
            CookiesConfig:
              CookieBehavior: none
            EnableAcceptEncodingBrotli: true
            EnableAcceptEncodingGzip: true
            HeadersConfig:
              HeaderBehavior: none
            QueryStringsConfig:
              QueryStringBehavior: none

    # 파일명 변경 기반 해시 정적 자산의 장기 캐시
    StaticAssetsPolicy:
      Type: AWS::CloudFront::CachePolicy
      Properties:
        CachePolicyConfig:
          Name: ${self:provider.stage}-${self:service}-static-assets
          DefaultTTL: 31536000
          MaxTTL: 31536000
          MinTTL: 86400
          ParametersInCacheKeyAndForwardedToOrigin:
            CookiesConfig:
              CookieBehavior: none
            EnableAcceptEncodingBrotli: true
            EnableAcceptEncodingGzip: true
            HeadersConfig:
              HeaderBehavior: none
            QueryStringsConfig:
              QueryStringBehavior: none

    WebsiteBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedMethods:
                - GET
                - HEAD
              AllowedHeaders:
                - '*'

    WebsiteBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref WebsiteBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action:
                - s3:GetObject
              Resource: !Sub '${WebsiteBucket.Arn}/*'

    WebsiteCloudFront:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Comment: My Commit Web App - ${self:provider.stage}
          PriceClass: PriceClass_All # 전 세계 모든 엣지 로케이션
          HttpVersion: http2and3

          Aliases:
            Fn::If:
              - UseCustomDomain
              - - ${self:custom.webDomainName}
              - !Ref AWS::NoValue
          ViewerCertificate:
            Fn::If:
              - UseCustomDomain
              - AcmCertificateArn: ${self:custom.acmCertificateArn}
                SslSupportMethod: sni-only
                MinimumProtocolVersion: TLSv1.2_2021
              - CloudFrontDefaultCertificate: true

          Origins:
            - Id: S3Origin
              DomainName: !Sub '${WebsiteBucket}.s3-website.${AWS::Region}.amazonaws.com'
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
          # SPA 기본 진입 경로 "/" 요청에 대한 최신 HTML 확인
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: !Ref CachingDisabledPolicy
          CacheBehaviors:
            # 직접 /index.html 접근 시 동일한 즉시 재검사
            - PathPattern: index.html
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref CachingDisabledPolicy
            # 새 precache manifest 인지를 위한 서비스 워커 스크립트 갱신
            - PathPattern: sw.js
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref CachingDisabledPolicy
            # vite-plugin-pwa 등록 스크립트의 즉시 최신본 수신
            - PathPattern: registerSW.js
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref CachingDisabledPolicy
            # 설치 메타데이터의 오래된 상태 잔존 방지
            - PathPattern: manifest.webmanifest
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref CachingDisabledPolicy
            # 파일명 변경 기반 workbox 런타임 파일의 immutable 캐시
            - PathPattern: workbox-*.js
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref StaticAssetsPolicy
            # Vite 생성 해시 자산 묶음의 장기 캐시
            - PathPattern: assets/*
              TargetOriginId: S3Origin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
              CachedMethods:
                - GET
                - HEAD
              Compress: true
              CachePolicyId: !Ref StaticAssetsPolicy
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
              # SPA fallback HTML 의 에지 장기 잔존 방지
              ErrorCachingMinTTL: 0
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              # SPA fallback HTML 의 에지 장기 잔존 방지
              ErrorCachingMinTTL: 0

  Outputs:
    WebsiteBucketName:
      Description: S3 Bucket Name
      Value: !Ref WebsiteBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-bucket-name

    WebsiteURL:
      Description: S3 Website URL
      Value: !GetAtt WebsiteBucket.WebsiteURL
      Export:
        Name: ${self:service}-${self:provider.stage}-website-url

    CloudFrontURL:
      Description: CloudFront Distribution URL
      Value: !GetAtt WebsiteCloudFront.DomainName
      Export:
        Name: ${self:service}-${self:provider.stage}-cloudfront-url

    CloudFrontDistributionId:
      Description: CloudFront Distribution ID
      Value: !Ref WebsiteCloudFront
      Export:
        Name: ${self:service}-${self:provider.stage}-cloudfront-id
